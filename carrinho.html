<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Carrinho - Etiquetas Adesivas</title>
  <style>
    /* Mesmo estilo base da página inicial */
    * { margin:0; padding:0; box-sizing: border-box; }
    :root {
      --azul: #0a58ca;
      --azul-escuro: #0a3b7a;
      --mostarda: #e6b422;
      --mostarda-escuro: #c49a0c;
      --cinza-claro: #f8f9fa;
      --cinza-borda: #e9ecef;
      --branco: #ffffff;
      --texto: #212529;
      --shadow: 0 0.5rem 1rem rgba(0,0,0,0.05);
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--cinza-claro);
      color: var(--texto);
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .top-bar {
      background: var(--mostarda);
      padding: 0.6rem 0;
    }
    .header {
      background: var(--branco);
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--cinza-borda);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo a {
      font-size: 1.5rem;
      font-weight: bold;
      text-decoration: none;
      color: var(--azul);
    }
    .logo span { color: var(--mostarda); }
    .cart-icon {
      background: var(--mostarda);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      color: #2c2c2c;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cart-count {
      background: var(--azul);
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
    .cart-page {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      margin: 2rem 0;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--cinza-borda);
    }
    .cart-item-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }
    .quantity-input {
      width: 60px;
      padding: 0.3rem;
      text-align: center;
      border: 1px solid var(--cinza-borda);
      border-radius: 0.5rem;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #dc3545;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .cart-total {
      text-align: right;
      margin-top: 1.5rem;
      font-size: 1.2rem;
    }
    .btn {
      display: inline-block;
      background: var(--mostarda);
      color: #2c2c2c;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--azul);
      color: white;
    }
    .empty-cart {
      text-align: center;
      padding: 3rem;
    }
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 1rem; border: 1px solid var(--cinza-borda); padding: 1rem; }
      td { display: flex; justify-content: space-between; align-items: center; border: none; padding: 0.5rem 0; }
      td::before { content: attr(data-label); font-weight: bold; width: 40%; }
      .cart-item-img { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
<div class="top-bar"><div class="container">🛒 Carrinho de compras</div></div>
<header class="header"><div class="container" style="display: flex; justify-content: space-between; align-items: center;">
  <div class="logo"><a href="index.html">Etiquetas <span>Adesivas</span></a></div>
  <a href="index.html" class="cart-icon">← Continuar comprando</a>
</div></header>

<div class="container">
  <div class="cart-page" id="cartPage">
    <!-- conteúdo dinâmico -->
  </div>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function renderCart() {
    const container = document.getElementById('cartPage');
    if (!cart.length) {
      container.innerHTML = `<div class="empty-cart"><h2>Seu carrinho está vazio</h2><a href="index.html" class="btn btn-primary">Voltar às compras</a></div>`;
      return;
    }

    let html = `<table><thead><tr><th>Produto</th><th>Nome</th><th>Preço</th><th>Quantidade</th><th>Subtotal</th><th></th></tr></thead><tbody>`;
    let total = 0;
    cart.forEach((item, idx) => {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      html += `
        <tr data-id="${item.id}">
          <td data-label="Produto"><img src="${item.image}" class="cart-item-img" alt="${item.name}"></td>
          <td data-label="Nome">${item.name}</td>
          <td data-label="Preço">R$ ${item.price.toFixed(2)}</td>
          <td data-label="Quantidade"><input type="number" min="1" value="${item.quantity}" class="quantity-input" data-id="${item.id}"></td>
          <td data-label="Subtotal">R$ ${subtotal.toFixed(2)}</td>
          <td data-label="Remover"><button class="remove-btn" data-id="${item.id}">🗑️</button></td>
        </tr>
      `;
    });
    html += `</tbody></table>
      <div class="cart-total"><strong>Total: R$ ${total.toFixed(2)}</strong></div>
      <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
        <a href="index.html" class="btn">Continuar comprando</a>
        <a href="checkout.html" class="btn btn-primary">Finalizar compra</a>
      </div>`;
    container.innerHTML = html;

    // Eventos quantidade
    document.querySelectorAll('.quantity-input').forEach(input => {
      input.addEventListener('change', (e) => {
        const id = input.dataset.id;
        const newQty = parseInt(input.value);
        if (newQty > 0) {
          const item = cart.find(i => i.id === id);
          if (item) item.quantity = newQty;
          localStorage.setItem('cart', JSON.stringify(cart));
          renderCart();
        }
      });
    });
    // Eventos remover
    document.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.dataset.id;
        cart = cart.filter(i => i.id !== id);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
      });
    });
  }

  renderCart();
</script>
</body>
</html>
