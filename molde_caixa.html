<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECS Gráfica - Gerador + Pedido</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center;padding:20px}
.container{max-width:1100px;margin:auto}
canvas{background:#fff;border:2px solid red;margin-top:20px}
input,select,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#e11d48;color:#fff;cursor:pointer}
.box{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px}
</style>
</head>
<body>
<div class="container">
<h1>📦 ECS Gráfica Rápida</h1>
<p>Monte sua caixa e faça o pedido online</p>

<div class="box">
<input type="number" id="w" placeholder="Largura (mm)" value="100">
<input type="number" id="h" placeholder="Altura (mm)" value="80">
<input type="number" id="d" placeholder="Profundidade (mm)" value="60">
<select id="tipo">
<option value="pb">Preto e Branco</option>
<option value="color">Colorido</option>
</select>
<br>
<button onclick="draw()">Gerar Molde</button>
</div>

<canvas id="c" width="900" height="500"></canvas>

<div class="box">
<h2>💰 Valor: R$ <span id="valor">0.00</span></h2>
<button onclick="fazerPedido()">📲 Fazer Pedido</button>
</div>

</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const SCALE=3;

function mm(v){return v*SCALE}

function line(x1,y1,x2,y2,color,dash=false){
 ctx.beginPath();
 ctx.setLineDash(dash?[6,4]:[]);
 ctx.strokeStyle=color;
 ctx.moveTo(x1,y1);
 ctx.lineTo(x2,y2);
 ctx.stroke();
}

function calcularPreco(area, tipo){
 let precoBase = tipo==='color'?0.30:0.19;
 return (area/100)*precoBase + 2; // margem
}

function draw(){
 ctx.clearRect(0,0,900,500);
 let w=parseFloat(wInput.value);
 let h=parseFloat(hInput.value);
 let d=parseFloat(dInput.value);
 let tipo=tipoInput.value;

 let x=200,y=200;

 line(x,y,x+mm(w),y,'red');
 line(x+mm(w),y,x+mm(w),y+mm(h),'red');
 line(x+mm(w),y+mm(h),x,y+mm(h),'red');
 line(x,y+mm(h),x,y,'red');

 let area = (w*h)/100;
 let valor = calcularPreco(area,tipo);
 document.getElementById('valor').innerText = valor.toFixed(2);
}

function fazerPedido(){
 let w=wInput.value;
 let h=hInput.value;
 let d=dInput.value;
 let valor=document.getElementById('valor').innerText;

 let msg = `Pedido ECS Gráfica:%0A📦 Caixa ${w}x${h}x${d}mm%0A💰 R$ ${valor}`;
 window.open(`https://wa.me/5513988089754?text=${msg}`,'_blank');
}

const wInput=document.getElementById('w');
const hInput=document.getElementById('h');
const dInput=document.getElementById('d');
const tipoInput=document.getElementById('tipo');

wInput.oninput=draw;
hInput.oninput=draw;
dInput.oninput=draw;
tipoInput.onchange=draw;

draw();
</script>
</body>
</html>
