<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Moldes de Caixa</title>
<style>
body{font-family:Arial;background:#111;color:#fff;text-align:center;padding:20px}
canvas{background:#fff;border:2px solid red;margin-top:20px}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:red;color:#fff;cursor:pointer}
</style>
</head>
<body>
<h1>📦 Gerador de Moldes</h1>

<div>
<label>Largura</label>
<input type="number" id="w" value="100">
<label>Altura</label>
<input type="number" id="h" value="80">
<label>Profundidade</label>
<input type="number" id="d" value="60">
<button onclick="draw()">Gerar</button>
</div>

<canvas id="c" width="800" height="500"></canvas>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function line(x1,y1,x2,y2,color,dash=false){
 ctx.beginPath();
 ctx.setLineDash(dash?[6,4]:[]);
 ctx.strokeStyle=color;
 ctx.moveTo(x1,y1);
 ctx.lineTo(x2,y2);
 ctx.stroke();
}

function draw(){
 ctx.clearRect(0,0,800,500);
 let w=parseInt(wInput.value);
 let h=parseInt(hInput.value);
 let d=parseInt(dInput.value);

 let x=200,y=200;

 // base
 line(x,y,x+w,y,'red');
 line(x+w,y,x+w,y+h,'red');
 line(x+w,y+h,x,y+h,'red');
 line(x,y+h,x,y,'red');

 // frente
 line(x,y-d,x+w,y-d,'red');
 line(x,y-d,x,y,'black',true);
 line(x+w,y-d,x+w,y,'black',true);

 // trás
 line(x,y+h,x,y+h+d,'black',true);
 line(x+w,y+h,x+w,y+h+d,'black',true);
 line(x,y+h+d,x+w,y+h+d,'red');
}

const wInput=document.getElementById('w');
const hInput=document.getElementById('h');
const dInput=document.getElementById('d');

draw();
</script>
</body>
</html>
