<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Finalizar Compra</title>
  <style>
    body { font-family: system-ui; background: #f8f9fa; }
    .container { max-width: 600px; margin: 0 auto; padding: 2rem; background: white; border-radius: 1rem; }
    label { display: block; margin-top: 1rem; }
    input, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 0.5rem; }
    button { background: #0a58ca; color: white; border: none; padding: 0.75rem; width: 100%; margin-top: 1.5rem; border-radius: 2rem; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <h1>Finalizar Pedido</h1>
  <div id="order-summary"></div>
  <form id="checkout-form">
    <label>Nome completo*</label>
    <input type="text" id="name" required>

    <label>E-mail*</label>
    <input type="email" id="email" required>

    <label>Telefone*</label>
    <input type="tel" id="phone" required>

    <label>Endereço de entrega*</label>
    <textarea id="address" rows="3" required></textarea>

    <button type="submit">Pagar com Mercado Pago</button>
  </form>
</div>

<script>
  // Recuperar carrinho do sessionStorage
  const cart = JSON.parse(sessionStorage.getItem('checkoutCart'));
  if (!cart || cart.length === 0) {
    alert('Carrinho vazio. Volte para a página inicial.');
    window.location.href = 'index.html';
  }

  // Calcular total
  const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

  // Exibir resumo
  const summaryDiv = document.getElementById('order-summary');
  summaryDiv.innerHTML = `<h3>Resumo do pedido</h3>${cart.map(item => `
    <div>${item.name} (x${item.quantity}) - R$ ${(item.price * item.quantity).toFixed(2)}</div>
  `).join('')}<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;

  // Envio do pedido
  const form = document.getElementById('checkout-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const customer = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value
    };

    const orderData = {
      items: cart.map(item => ({ name: item.name, price: item.price, quantity: item.quantity })),
      customer,
      total
    };

    // Enviar para o backend
    try {
      const response = await fetch('http://seu-ip-do-contabo:3000/api/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderData)
      });
      const data = await response.json();
      if (data.paymentUrl) {
        // Limpar carrinho após redirecionar
        localStorage.removeItem('cart');
        window.location.href = data.paymentUrl;
      } else {
        alert('Erro ao criar pedido. Tente novamente.');
      }
    } catch (err) {
      console.error(err);
      alert('Erro de comunicação com o servidor.');
    }
  });
</script>
</body>
</html>
