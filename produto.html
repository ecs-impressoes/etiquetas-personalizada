<!DOCTYPE html>

  <style>
    /* Mesmo estilo base do index.html */
    * { margin:0; padding:0; box-sizing: border-box; }
    :root {
      --azul: #0a58ca;
      --azul-escuro: #0a3b7a;
      --mostarda: #e6b422;
      --mostarda-escuro: #c49a0c;
      --cinza-claro: #f8f9fa;
      --cinza-borda: #e9ecef;
      --branco: #ffffff;
      --texto: #212529;
      --shadow: 0 0.5rem 1rem rgba(0,0,0,0.05);
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--cinza-claro);
      color: var(--texto);
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .top-bar {
      background: var(--mostarda);
      padding: 0.6rem 0;
    }
    .header {
      background: var(--branco);
      padding: 1rem 0;
      border-bottom: 1px solid var(--cinza-borda);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo a {
      font-size: 1.5rem;
      font-weight: bold;
      text-decoration: none;
      color: var(--azul);
    }
    .logo span { color: var(--mostarda); }
    .cart-icon {
      background: var(--mostarda);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      color: #2c2c2c;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cart-count {
      background: var(--azul);
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin: 2rem 0;
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: var(--shadow);
    }
    .product-image {
      text-align: center;
    }
    .product-image img {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
    }
    .product-info h1 {
      color: var(--azul);
      margin-bottom: 0.5rem;
    }
    .product-id {
      color: #6c757d;
      margin-bottom: 1rem;
      display: block;
    }
    .price {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--azul);
      margin: 1rem 0;
    }
    .pix-price {
      font-size: 1rem;
      color: #2b8c4a;
    }
    .description {
      margin: 1.5rem 0;
      line-height: 1.6;
    }
    .description h3 {
      color: var(--azul);
      margin-bottom: 0.5rem;
    }
    .btn {
      display: inline-block;
      background: var(--mostarda);
      color: #2c2c2c;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-primary {
      background: var(--azul);
      color: white;
    }
    .back-link {
      margin: 1rem 0;
      display: inline-block;
    }
    @media (max-width: 768px) {
      .product-detail {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  ];

  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function updateCartCount() {
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    const countSpan = document.getElementById('cartCount');
    if (countSpan) countSpan.innerText = totalItems;
  }

  function addToCart(product) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({
        id: product.id,
        name: product.name,
        price: product.price,
        quantity: 1,
        image: product.image
      });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    alert(`${product.name} adicionado ao carrinho!`);
  }

  function renderProductDetail() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = products.find(p => p.id === productId);
    const container = document.getElementById('productDetail');
    if (!product) {
      container.innerHTML = '<p>Produto não encontrado.</p>';
      return;
    }
    container.innerHTML = `
      <div class="product-image">
        <img src="${product.image}" alt="${product.name}">
      </div>
      <div class="product-info">
        <h1>${product.name}</h1>
        <span class="product-id">ID: ${product.id.toUpperCase()}</span>
        <div class="price">R$ ${product.price.toFixed(2)}</div>
        <div class="pix-price">ou R$ ${(product.price * 0.95).toFixed(2)} via Pix (5% off)</div>
        <div class="description">
          <h3>Descrição</h3>
          <p>${product.longDesc || product.description}</p>
        </div>
        <button id="buyButton" class="btn btn-primary">🛒 Comprar agora</button>
      </div>
    `;
    document.getElementById('buyButton').addEventListener('click', () => {
      addToCart(product);
      window.location.href = 'carrinho.html';
    });
  }

  renderProductDetail();
  updateCartCount();
</script>
</body>
</html>
